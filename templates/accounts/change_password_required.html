{% extends "base.html" %}
{% block title %}تغییر رمز عبور{% endblock %}

{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;padding:1rem;">
  <div style="width:100%;max-width:420px;">

    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:32px 28px;box-shadow:0 4px 24px rgba(0,0,0,.06);">

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
        <div style="width:40px;height:40px;border-radius:12px;background:#fef3c7;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="20" height="20" fill="none" stroke="#d97706" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
        </div>
        <div>
          <h1 style="font-size:1rem;font-weight:700;color:#1e293b;margin:0;">تغییر رمز عبور الزامی</h1>
          <p style="font-size:.78rem;color:#64748b;margin:2px 0 0;">رمز عبور پیش‌فرض شما هنوز تغییر نکرده است.</p>
        </div>
      </div>

      {% if error %}
      <div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:.83rem;color:#991b1b;">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" style="display:flex;flex-direction:column;gap:14px;">
        {% csrf_token %}

        <div>
          <label class="detail-label">رمز عبور فعلی</label>
          <input type="password" name="current_password" required autocomplete="current-password"
                 class="form-control">
        </div>

        <div>
          <label class="detail-label">رمز عبور جدید</label>
          <input type="password" name="new_password" required autocomplete="new-password"
                 class="form-control">
        </div>

        <div>
          <label class="detail-label">تکرار رمز عبور جدید</label>
          <input type="password" name="confirm_password" required autocomplete="new-password"
                 class="form-control">
        </div>

        <div style="display:flex;gap:10px;margin-top:4px;">
          <button type="submit"
                  style="flex:1;padding:.55rem 1rem;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;">
            تغییر رمز عبور
          </button>
          <button type="submit" name="do_later" value="1" formnovalidate
                  style="flex:1;padding:.55rem 1rem;background:#fff;color:#64748b;border:1px solid #e5e7eb;border-radius:10px;font-size:.85rem;cursor:pointer;">
            بعداً انجام می‌دهم
          </button>
        </div>
      </form>

    </div>

    <p style="text-align:center;font-size:.75rem;color:#94a3b8;margin-top:14px;">
      در صورت تغییر نکردن رمز، این هشدار در هر صفحه نمایش داده می‌شود.
    </p>
  </div>
</div>
{% endblock %}
