{% extends "base.html" %}
{% block title %}تغییر رمز عبور{% endblock %}

{% block body %}
<div class="auth-shell" style="align-items:center;justify-content:center;">
  <div class="auth-form-box">

    <div class="card">

      <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-5);">
        <div class="stat-card-icon amber">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
        </div>
        <div>
          <h1 class="page-header-title" style="font-size:var(--font-size-md);">تغییر رمز عبور الزامی</h1>
          <p class="page-header-subtitle">رمز عبور پیش‌فرض شما هنوز تغییر نکرده است.</p>
        </div>
      </div>

      {% if error %}
      <div class="alert alert-danger" style="margin-bottom:var(--space-4);">
        <div class="alert-body">{{ error }}</div>
      </div>
      {% endif %}

      <form method="post" class="form-stack">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label required">رمز عبور فعلی</label>
          <input type="password" name="current_password" required autocomplete="current-password"
                 class="form-control">
        </div>

        <div class="form-group">
          <label class="form-label required">رمز عبور جدید</label>
          <input type="password" name="new_password" required autocomplete="new-password"
                 class="form-control">
        </div>

        <div class="form-group">
          <label class="form-label required">تکرار رمز عبور جدید</label>
          <input type="password" name="confirm_password" required autocomplete="new-password"
                 class="form-control">
        </div>

        <div class="form-actions" style="margin-top:var(--space-2);padding-top:0;border-top:none;">
          <button type="submit" name="do_later" value="1" formnovalidate class="btn btn-outline">
            بعداً انجام می‌دهم
          </button>
          <button type="submit" class="btn btn-primary">
            تغییر رمز عبور
          </button>
        </div>
      </form>

    </div>

    <p class="page-header-subtitle" style="text-align:center;margin-top:var(--space-4);">
      در صورت تغییر نکردن رمز، این هشدار در هر صفحه نمایش داده می‌شود.
    </p>
  </div>
</div>
{% endblock %}
