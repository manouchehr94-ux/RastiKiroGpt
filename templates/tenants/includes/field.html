{% comment %}
Reusable form field partial.
Variables: name, label, value, required (bool), dir (ltr|rtl), placeholder, textarea (bool)
{% endcomment %}
<div class="mb-4">
  <label for="id_{{ name }}" class="block text-sm font-medium text-gray-700 mb-1">
    {{ label }}{% if required %} <span class="text-red-500">*</span>{% endif %}
  </label>
  {% if textarea %}
    <textarea id="id_{{ name }}" name="{{ name }}"
              rows="3"
              dir="{{ dir|default:'rtl' }}"
              placeholder="{{ placeholder|default:'' }}"
              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              {% if required %}required{% endif %}>{{ value|default:'' }}</textarea>
  {% else %}
    <input id="id_{{ name }}" name="{{ name }}"
           type="text"
           value="{{ value|default:'' }}"
           dir="{{ dir|default:'rtl' }}"
           placeholder="{{ placeholder|default:'' }}"
           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
           {% if required %}required{% endif %}>
  {% endif %}
</div>
